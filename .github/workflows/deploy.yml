name: Deploy

on:
  push:
    branches: [main]
    paths:
      - 'log-analyzer/**'
      - '.github/workflows/deploy.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 10m
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}
            
            # Pull latest code
            git pull origin main
            
            # Save current image as backup before building new one
            docker tag xray-log-analyzer:latest xray-log-analyzer:backup 2>/dev/null || true
            
            # Build new image
            docker compose build analyzer-server
            
            # Tag new image
            docker tag log-analyzer-analyzer-server:latest xray-log-analyzer:latest 2>/dev/null || true
            
            # Restart with new image
            docker compose up -d --force-recreate analyzer-server
            
            # Wait for container to start
            echo "Waiting for container to start..."
            sleep 10
            
            # Health check (wait up to 3 minutes)
            echo "Starting health check..."
            MAX_ATTEMPTS=36
            ATTEMPT=0
            
            while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
              ATTEMPT=$((ATTEMPT + 1))
              
              # Check if container is running
              if ! docker compose ps analyzer-server | grep -q "Up"; then
                echo "Attempt $ATTEMPT/$MAX_ATTEMPTS - Container not running yet..."
                sleep 5
                continue
              fi
              
              # Check if app responds
              if docker compose exec -T analyzer-server wget -q --spider --timeout=5 http://localhost:8237/health 2>/dev/null; then
                echo "✅ Health check passed on attempt $ATTEMPT!"
                # Clean up old images but keep backup
                docker image prune -f
                exit 0
              fi
              
              echo "Attempt $ATTEMPT/$MAX_ATTEMPTS - App starting..."
              sleep 5
            done
            
            # Health check failed - rollback
            echo "❌ Health check failed after $MAX_ATTEMPTS attempts!"
            echo "=== Container logs ==="
            docker compose logs --tail=50 analyzer-server
            
            # Rollback to backup
            echo "Rolling back to previous version..."
            if docker image inspect xray-log-analyzer:backup >/dev/null 2>&1; then
              docker tag xray-log-analyzer:backup log-analyzer-analyzer-server:latest
              docker compose up -d --force-recreate analyzer-server
              echo "Rollback complete"
            fi
            exit 1

      - name: Notify success
        if: success()
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -n "$TELEGRAM_TOKEN" ] && [ -n "$TELEGRAM_CHAT_ID" ]; then
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
              -d chat_id="${TELEGRAM_CHAT_ID}" \
              -d parse_mode="HTML" \
              -d text="✅ <b>Deploy успешен!</b>%0A%0A📦 Репозиторий: ${{ github.repository }}%0A🔀 Коммит: <code>${{ github.sha }}</code>%0A👤 Автор: ${{ github.actor }}%0A📝 ${{ github.event.head_commit.message }}"
          fi

      - name: Notify failure
        if: failure()
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -n "$TELEGRAM_TOKEN" ] && [ -n "$TELEGRAM_CHAT_ID" ]; then
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
              -d chat_id="${TELEGRAM_CHAT_ID}" \
              -d parse_mode="HTML" \
              -d text="❌ <b>Deploy FAILED!</b>%0A%0A📦 Репозиторий: ${{ github.repository }}%0A🔀 Коммит: <code>${{ github.sha }}</code>%0A👤 Автор: ${{ github.actor }}%0A%0A🔗 <a href='https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}'>Логи</a>"
          fi
