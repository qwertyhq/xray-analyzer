name: Build and Deploy

on:
  push:
    branches: [main]
    paths:
      - 'log-analyzer/**'
      - '.github/workflows/deploy.yml'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/log-analyzer

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./log-analyzer/server
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Notify build success
        if: success()
        run: |
          echo "✅ Build successful: ${{ steps.meta.outputs.tags }}"

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: production
    
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}
            
            # Save current image as backup for rollback
            docker tag ghcr.io/${{ github.repository }}/log-analyzer:latest \
                       ghcr.io/${{ github.repository }}/log-analyzer:backup 2>/dev/null || true
            
            # Pull new image
            docker pull ghcr.io/${{ github.repository }}/log-analyzer:latest
            
            # Restart with new image
            docker compose up -d --force-recreate analyzer-server
            
            # Health check (wait up to 60 seconds)
            echo "Waiting for health check..."
            for i in {1..12}; do
              if docker compose exec -T analyzer-server wget -q --spider http://localhost:8237/health 2>/dev/null; then
                echo "✅ Health check passed!"
                # Cleanup old images
                docker image prune -f
                exit 0
              fi
              echo "Attempt $i/12 - waiting..."
              sleep 5
            done
            
            # Health check failed - rollback
            echo "❌ Health check failed! Rolling back..."
            docker tag ghcr.io/${{ github.repository }}/log-analyzer:backup \
                       ghcr.io/${{ github.repository }}/log-analyzer:latest
            docker compose up -d --force-recreate analyzer-server
            docker image prune -f
            exit 1

      - name: Notify success
        if: success()
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -n "$TELEGRAM_TOKEN" ] && [ -n "$TELEGRAM_CHAT_ID" ]; then
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
              -d chat_id="${TELEGRAM_CHAT_ID}" \
              -d parse_mode="HTML" \
              -d text="✅ <b>Deploy успешен!</b>%0A%0A📦 Репозиторий: ${{ github.repository }}%0A🔀 Коммит: <code>${{ github.sha }}</code>%0A👤 Автор: ${{ github.actor }}%0A📝 ${{ github.event.head_commit.message }}"
          fi

      - name: Notify failure
        if: failure()
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -n "$TELEGRAM_TOKEN" ] && [ -n "$TELEGRAM_CHAT_ID" ]; then
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
              -d chat_id="${TELEGRAM_CHAT_ID}" \
              -d parse_mode="HTML" \
              -d text="❌ <b>Deploy FAILED!</b>%0A%0A📦 Репозиторий: ${{ github.repository }}%0A🔀 Коммит: <code>${{ github.sha }}</code>%0A👤 Автор: ${{ github.actor }}%0A%0A⚠️ Выполнен rollback на предыдущую версию%0A%0A🔗 <a href='https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}'>Логи</a>"
          fi
